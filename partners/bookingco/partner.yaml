partner: bookingco
description: BookingCo fictional partner — demonstrates static and fetch patterns

datapoints:

  - name: reservation
    description: Fixed reservation lookup — static response, no session state
    pattern: static
    endpoints:
      - method: GET
        path: /bookingco/v1/reservation
        response:
          status: 200
          body:
            reservationId: "RES-001"
            status: confirmed
            guestName: "Jane Smith"
            checkIn: "2026-06-01"
            checkOut: "2026-06-03"
            roomType: DBL
            nights: 2

  - name: charges
    description: Retrieve posted charges for a property
    pattern: fetch
    endpoints:
      - method: GET
        path: /bookingco/v1/charges
        response:
          status: 200
