name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check imnot/ tests/

      - name: Format check
        run: ruff format --check imnot/ tests/

  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=imnot --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run security scan
        run: |
          pip install bandit -q
          bandit -r imnot/ -f screen

  docker-smoke:
    name: Docker smoke test (read-only /app)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Inline CSS into admin UI
        run: make ui

      - name: Build image
        run: docker build -t imnot-smoke .

      - name: Run with read-only /app and writable /app/data only
        run: |
          mkdir -p /tmp/imnot-data
          chmod 777 /tmp/imnot-data
          docker run -d --name imnot-smoke \
            --read-only \
            --tmpfs /tmp \
            -v /tmp/imnot-data:/app/data \
            -e IMNOT_ADMIN_KEY=smoke-test \
            -p 18080:8000 \
            imnot-smoke
          # Wait up to 15 s for the server to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:18080/healthz && break
            sleep 1
          done
          curl -sf http://localhost:18080/healthz

      - name: Show logs on failure
        if: failure()
        run: docker logs imnot-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f imnot-smoke || true

  qa:
    name: E2E QA suite
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install imnot
        run: pip install -e ".[dev]"

      - name: Run QA suite
        env:
          IMNOT_QA_PORT: 18000
          IMNOT_QA_CALLBACK_PORT: 18998
        run: bash scripts/qa/run.sh
